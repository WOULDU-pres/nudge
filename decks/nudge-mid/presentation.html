          &lt;span class=&quot;fb-red&quot;&gt;&lt;strong&gt;discard ✗&lt;/strong&gt;&lt;/span&gt;
          → ①로 반복
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;sidebar&quot;&gt;

      &lt;div class=&quot;side-card purple&quot;&gt;

  &lt;h2&gt;RALPH 내부 루프&lt;/h2&gt;
  &lt;p class=&quot;sub&quot;&gt;Hypothesize → Plan → Act → Evaluate → Reason → Learn — 1회 시뮬레이션의 6단계&lt;/p&gt;

  &lt;div class=&quot;content&quot;&gt;
    &lt;div class=&quot;loop-visual&quot;&gt;
      &lt;div class=&quot;step s-h&quot;&gt;
        &lt;div class=&quot;letter&quot;&gt;H&lt;/div&gt;
        &lt;div class=&quot;info&quot;&gt;
          &lt;strong&gt;Hypothesize — 전략 가설 생성&lt;/strong&gt;
          &lt;span&gt;비싼 모델 · AIDA 퍼널 구조의 전략 3개 생성&lt;/span&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;arrow-d&quot;&gt;↓&lt;/div&gt;
      &lt;div class=&quot;step s-p&quot;&gt;
        &lt;div class=&quot;letter&quot;&gt;P&lt;/div&gt;
        &lt;div class=&quot;info&quot;&gt;
          &lt;strong&gt;Plan — 대상 선택&lt;/strong&gt;
          &lt;span&gt;코드 · 200명 중 테스트 대상 페르소나 선택&lt;/span&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;arrow-d&quot;&gt;↓&lt;/div&gt;
      &lt;div class=&quot;step s-a&quot;&gt;
        &lt;div class=&quot;letter&quot;&gt;A&lt;/div&gt;
        &lt;div class=&quot;info&quot;&gt;
          &lt;strong&gt;Act — 대화 시뮬레이션&lt;/strong&gt;
          &lt;span&gt;싼 모델 × 2 · 전략 × 페르소나 조합으로 3턴 대화 (병렬)&lt;/span&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;arrow-d&quot;&gt;↓&lt;/div&gt;
      &lt;div class=&quot;step s-e&quot;&gt;
        &lt;div class=&quot;letter&quot;&gt;E&lt;/div&gt;
        &lt;div class=&quot;info&quot;&gt;
          &lt;strong&gt;Evaluate — Judge 채점&lt;/strong&gt;
          &lt;span&gt;비싼 모델 · 4차원 (engagement, relevance, persuasion, purchase_intent) + 퍼널&lt;/span&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;arrow-d&quot;&gt;↓&lt;/div&gt;
      &lt;div class=&quot;step s-r&quot;&gt;
        &lt;div class=&quot;letter&quot;&gt;R&lt;/div&gt;
        &lt;div class=&quot;info&quot;&gt;
          &lt;strong&gt;Reason — 패턴 분석&lt;/strong&gt;
          &lt;span&gt;비싼 모델 · 상위/하위 대화 비교 → 퍼널 병목 식별&lt;/span&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;arrow-d&quot;&gt;↓&lt;/div&gt;
      &lt;div class=&quot;step s-l&quot;&gt;
        &lt;div class=&quot;letter&quot;&gt;L&lt;/div&gt;
        &lt;div class=&quot;info&quot;&gt;
          &lt;strong&gt;Learn — 학습 추출&lt;/strong&gt;
          &lt;span&gt;비싼 모델 · 재사용 가능한 학습 포인트 → Ledger에 누적&lt;/span&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;right-panel&quot;&gt;
      &lt;div class=&quot;rp-card&quot;&gt;
        &lt;h4&gt;💬 대화 구조 (A 단계)&lt;/h4&gt;
        &lt;p&gt;
          턴 0: 세일즈 오프닝 &lt;code&gt;Attention→Interest&lt;/code&gt;&lt;br&gt;
          턴 1: 가치 제시 &lt;code&gt;Interest→Desire&lt;/code&gt;&lt;br&gt;
          턴 2: CTA &lt;code&gt;Desire→Action&lt;/code&gt;&lt;br&gt;
          = 3턴 6메시지, AIDA 전체 커버
        &lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;rp-card&quot;&gt;
        &lt;h4&gt;⚖️ 4차원 평가 (E 단계)&lt;/h4&gt;
        &lt;p&gt;
          각 0-25점, 합계 0-100점&lt;br&gt;
          &lt;code&gt;engagement&lt;/code&gt; &lt;code&gt;relevance&lt;/code&gt;&lt;br&gt;
          &lt;code&gt;persuasion&lt;/code&gt; &lt;code&gt;purchase_intent&lt;/code&gt;&lt;br&gt;
          + &lt;code&gt;funnel_progress&lt;/code&gt; 0-3 (어디서 이탈?)
        &lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;ledger-box&quot;&gt;
        &lt;h4&gt;📚 Strategy Ledger&lt;/h4&gt;
        &lt;p&gt;
          세대마다 누적되는 전략 원장.&lt;br&gt;
          &lt;strong&gt;proven_effective&lt;/strong&gt;: 3세대 연속 성공 패턴&lt;br&gt;
          &lt;strong&gt;never_repeat&lt;/strong&gt;: 3세대 연속 실패 패턴&lt;br&gt;
          → 3-레이어 압축으로 context 폭발 방지
        &lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;rp-card&quot;&gt;
        &lt;h4&gt;🔄 외부 루프와의 관계&lt;/h4&gt;
        &lt;p&gt;
          RALPH = 실행자 (&quot;전략 테스트&quot;)&lt;br&gt;
          Autoresearch = 진화자 (&quot;프롬프트 자체 개선&quot;)&lt;br&gt;
          → 메타 최적화
        &lt;/p&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    </div>
  </div>
  <div class="nav">
    <button id="prev" onclick="go(-1)">← 이전</button>
    <button id="next" onclick="go(1)">다음 →</button>
  </div>

  <script>
    const SLIDE_W = 1280, SLIDE_H = 720;
    let current = 0;
    const slides = document.querySelectorAll('.slide');
    const total = slides.length;

    function resizeAll() {
      document.querySelectorAll('.slide-wrapper').forEach(wrapper => {
        // Available space
        const maxW = window.innerWidth - 24;   // padding
        const maxH = window.innerHeight - 80;  // padding + nav + label

        // Fit 16:9 into available space
        let w = maxW;
        let h = w * SLIDE_H / SLIDE_W;
        if (h > maxH) {
          h = maxH;
          w = h * SLIDE_W / SLIDE_H;
        }

        const scale = w / SLIDE_W;

        wrapper.style.width = w + 'px';
        wrapper.style.height = h + 'px';

        const frame = wrapper.querySelector('.slide-frame');
        if (frame) {
          frame.style.transform = 'scale(' + scale + ')';
          frame.style.width = SLIDE_W + 'px';
          frame.style.height = SLIDE_H + 'px';
        }
      });
    }

    function show(idx) {
      slides.forEach((s, i) => s.classList.toggle('active', i === idx));
      document.getElementById('prev').disabled = idx === 0;
      document.getElementById('next').disabled = idx === total - 1;
      document.getElementById('progress').style.width = ((idx + 1) / total * 100) + '%';
      current = idx;
    }

    function go(dir) {
      const next = current + dir;
      if (next >= 0 && next < total) show(next);
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
      if (e.key === 'Home') show(0);
      if (e.key === 'End') show(total - 1);
    });

    let touchX = 0;
    document.addEventListener('touchstart', e => touchX = e.touches[0].clientX);
    document.addEventListener('touchend', e => {
      const diff = e.changedTouches[0].clientX - touchX;
      if (Math.abs(diff) > 50) go(diff < 0 ? 1 : -1);
    });

    // Ensure iframes have no overflow
    document.querySelectorAll('iframe.slide-frame').forEach(iframe => {
      iframe.addEventListener('load', () => {
        try {
          const doc = iframe.contentDocument;
          if (doc && doc.body) {
            doc.body.style.overflow = 'hidden';
            doc.body.style.width = '1280px';
            doc.body.style.height = '720px';
            doc.body.style.margin = '0';
          }
        } catch(e) {}
      });
    });

    window.addEventListener('resize', resizeAll);
    resizeAll();
    show(0);
  </script>
