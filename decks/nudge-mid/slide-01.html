<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280,height=720">
<title>NUDGE — 표지</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 720px;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: #f8fafc;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    overflow: hidden;
  }
  .badge {
    background: rgba(99, 102, 241, 0.2);
    border: 1px solid rgba(99, 102, 241, 0.4);
    color: #a5b4fc;
    padding: 6px 20px;
    border-radius: 20px;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  h1 {
    font-size: 72px;
    font-weight: 800;
    letter-spacing: -2px;
    margin-bottom: 12px;
    background: linear-gradient(90deg, #818cf8, #22d3ee);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .tagline {
    font-size: 28px;
    color: #94a3b8;
    font-weight: 300;
    margin-bottom: 48px;
  }
  .divider {
    width: 80px; height: 2px;
    background: linear-gradient(90deg, #818cf8, #22d3ee);
    margin-bottom: 36px;
  }
  .team {
    font-size: 18px;
    color: #64748b;
    margin-bottom: 8px;
  }
  .members {
    font-size: 20px;
    color: #94a3b8;
    margin-bottom: 16px;
  }
  .github {
    font-size: 14px;
    color: #475569;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>
  <div class="badge">Ralphthon Seoul 2025</div>
  <h1>NUDGE</h1>
  <p class="tagline">10년치 영업 경험을, 하룻밤에.</p>
  <div class="divider"></div>
  <p class="team">팀 nudge</p>
  <p class="members">주현우 · 임승현 · 이재윤</p>
  <p class="github">github.com/WOULDU-pres/nudge</p>
</body>
</html>
